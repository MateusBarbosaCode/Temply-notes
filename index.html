<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Temply</title>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    <link rel="manifest" href="manifest.json">
</head>
<body>

<div class="container">

    <div class="header-main">
        <h1>Temply</h1>
        <button id="toggleMode">
            <img src="img/moon.png" id="themeIcon">
        </button>
    </div>

    <p> Suas Anotações.</p>

    <div class="content-wrapper">
        <div class="left-column">
            <textarea id="blocoDeNotas" placeholder="Comece a digitar aqui..."></textarea>
            
            <div class="agendamento-container">
                <label>Agendar Alarme:</label>
                <input type="datetime-local" id="dataHora">
            </div>

            <div class="agendamento-container">
                <label>Categoria:</label>
                <select id="categoria">
                    <option value="Particular">Particular</option>
                    <option value="Projetos">Projetos</option>
                    <option value="Hábitos">Hábitos</option>
                </select>
            </div>

            <div class="buttons">
                <button id="salvarNota">Salvar Nota</button>
                <button id="limparTudo">Limpar Tudo</button>
            </div>
        </div>

        <div class="right-column">
            <h3>Notas Salvas</h3>
            <div class="folder-filters">
                <button class="folder-btn active" onclick="trocarCategoria('Particular')">
                    <span>📁</span> Particular
                </button>
                <button class="folder-btn" onclick="trocarCategoria('Projetos')">
                    <span>📂</span> Projetos
                </button>
                <button class="folder-btn" onclick="trocarCategoria('Hábitos')">
                    <span>✅</span> Hábitos
                </button>
            </div>
            <div id="listaNotas"></div>
        </div>
    </div>
</div>

<footer>
    <p>&copy; 2026 Temply. Todos os direitos reservados.</p>
</footer>

<audio id="somAlarme" src="https://raw.githubusercontent.com/freeCodeCamp/cdn/master/build/testable-projects-fcc/audio/BeepSound.wav"></audio>

<script src="script.js"></script>
</body>
</html>
